<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新我生活系统</title>
  <meta name="description" content="一个温柔的私人记录工具，支持离线使用和本地备份。">
  <meta name="theme-color" content="#f8f3ea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="新我生活系统">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <style>
    /* 温柔低刺激色板，移动端优先。 */
    :root {
      --bg: #f8f3ea;
      --paper: #fffdf8;
      --paper-2: #f1f7f2;
      --blue-soft: #edf7fb;
      --purple-soft: #f4f1fb;
      --text: #303832;
      --muted: #708076;
      --line: #dedbd0;
      --green: #6f9b7a;
      --green-dark: #4f725a;
      --blue: #6e9db8;
      --purple: #9384bb;
      --rose: #c88484;
      --gold: #b68a51;
      --shadow: 0 12px 28px rgba(63, 72, 64, 0.09);
      --radius: 8px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #edf7fb 0, transparent 34rem), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      line-height: 1.58;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px 14px 36px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -16px -14px 16px;
      padding: 12px 14px 10px;
      background: rgba(248, 243, 234, 0.94);
      border-bottom: 1px solid rgba(222, 219, 208, 0.78);
      backdrop-filter: blur(14px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0;
      font-size: 21px;
      line-height: 1.2;
      font-weight: 850;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 20px;
      line-height: 1.25;
    }

    h3 {
      margin-bottom: 6px;
      font-size: 17px;
      line-height: 1.32;
    }

    .date-pill {
      flex: 0 0 auto;
      padding: 5px 10px;
      border: 1px solid #d5e5d6;
      border-radius: 999px;
      background: var(--paper-2);
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav,
    .tabs,
    .actions,
    .chips {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav,
    .tabs {
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar,
    .tabs::-webkit-scrollbar {
      display: none;
    }

    .btn,
    .btn-soft,
    .btn-ghost,
    .btn-danger,
    .nav-btn,
    .tab-btn {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 8px 12px;
      background: transparent;
      white-space: nowrap;
    }

    .btn {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: #fff;
      font-weight: 760;
    }

    .btn-soft {
      background: var(--paper-2);
      border-color: #d5e5d6;
      color: var(--green-dark);
      font-weight: 760;
    }

    .btn-ghost,
    .nav-btn,
    .tab-btn {
      background: rgba(255, 253, 248, 0.72);
      border-color: var(--line);
      color: var(--muted);
    }

    .btn-danger {
      background: var(--rose);
      border-color: var(--rose);
      color: #fff;
      font-weight: 760;
    }

    .nav-btn.active,
    .tab-btn.active {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: #fff;
      font-weight: 760;
    }

    .btn:active,
    .btn-soft:active,
    .btn-ghost:active,
    .btn-danger:active,
    .nav-btn:active,
    .tab-btn:active {
      transform: translateY(1px);
    }

    main {
      display: grid;
      gap: 14px;
    }

    .hero,
    .card,
    .record,
    .stat,
    .notice {
      border: 1px solid rgba(222, 219, 208, 0.88);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 20px;
      background: linear-gradient(135deg, #fffdf8 0%, #edf7fb 52%, #f4f1fb 100%);
    }

    .hero .quote {
      margin-bottom: 0;
      font-size: 18px;
      color: #3e4d44;
    }

    .card {
      padding: 16px;
    }

    .notice {
      padding: 13px;
      background: var(--blue-soft);
      color: #486276;
    }

    .notice.good {
      background: var(--paper-2);
      color: #4d7158;
    }

    .grid,
    .stats,
    .quick,
    .form,
    .records,
    .filters,
    .chart,
    .sleep-list {
      display: grid;
      gap: 10px;
    }

    .quick,
    .stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stat {
      min-height: 88px;
      padding: 13px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin: 5px 0 2px;
      color: var(--green-dark);
      font-size: 26px;
      line-height: 1;
    }

    label {
      display: grid;
      gap: 6px;
      color: #4a574f;
      font-weight: 720;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #d8d8cf;
      border-radius: var(--radius);
      padding: 10px 11px;
      background: #fffefa;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(111, 155, 122, 0.18);
    }

    .record {
      padding: 14px;
    }

    .record-head,
    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
    }

    .field {
      padding: 10px;
      border: 1px solid #ece8dc;
      border-radius: var(--radius);
      background: #fbf8f0;
    }

    .field strong {
      display: block;
      margin-bottom: 2px;
      color: #53615a;
      font-size: 13px;
    }

    .field p {
      margin-bottom: 0;
    }

    .tag,
    .badge,
    .check-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid #d5e5d6;
      background: var(--paper-2);
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 720;
    }

    .badge {
      border-color: #d8e8f0;
      background: var(--blue-soft);
      color: #536778;
    }

    .badge.warn {
      border-color: #edd2a9;
      background: #fff4dd;
      color: #7a5525;
    }

    .empty {
      padding: 16px;
      border: 1px dashed #d7d4c9;
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
    }

    .chart {
      grid-template-columns: repeat(7, minmax(0, 1fr));
      align-items: end;
      min-height: 150px;
      padding: 12px 8px 6px;
      border: 1px solid #ece8dc;
      border-radius: var(--radius);
      background: #fbf8f0;
    }

    .bar-cell {
      display: grid;
      gap: 5px;
      align-items: end;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      min-height: 6px;
      border-radius: 7px 7px 2px 2px;
      background: var(--blue);
    }

    .sleep-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid #ece8dc;
      border-radius: var(--radius);
      background: #fbf8f0;
    }

    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #c6c9be;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .dot.done {
      background: var(--green);
    }

    .timer-box {
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 20px;
      border: 1px solid #ddd6f1;
      border-radius: var(--radius);
      background: var(--purple-soft);
    }

    .timer-clock {
      font-variant-numeric: tabular-nums;
      font-size: 52px;
      line-height: 1;
      font-weight: 850;
      color: #4d4667;
    }

    .hidden {
      display: none;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 16px;
      z-index: 20;
      width: min(520px, calc(100% - 28px));
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: rgba(79, 114, 90, 0.96);
      color: #fff;
      text-align: center;
      box-shadow: var(--shadow);
    }

    @media (min-width: 760px) {
      .shell {
        padding: 24px 22px 48px;
      }

      .top {
        margin: -24px -22px 20px;
        padding: 14px 22px 12px;
      }

      h1 {
        font-size: 25px;
      }

      .quick {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid {
        grid-template-columns: minmax(300px, 0.82fr) minmax(360px, 1fr);
        align-items: start;
      }

      .filters {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand-row">
        <h1>新我生活系统</h1>
        <span class="date-pill" id="todayPill"></span>
      </div>
      <nav class="nav" id="nav" aria-label="主导航"></nav>
    </header>

    <main id="app"></main>
  </div>

  <input class="hidden" id="importFile" type="file" accept="application/json">
  <div id="toast"></div>

  <script>
    (() => {
      "use strict";

      /* 只属于本记录平台的存储 key，避免和其他本地页面混用。 */
      const STORAGE_KEY = "xinwo_life_system_records_v1";
      const FEAR_TAGS = ["关系", "学业", "家庭", "身体", "未来"];
      const SHARE_STATUS = ["继续存着", "已发送", "不发送"];

      const app = document.querySelector("#app");
      const nav = document.querySelector("#nav");
      const todayPill = document.querySelector("#todayPill");
      const importFile = document.querySelector("#importFile");
      const toastHost = document.querySelector("#toast");

      const pages = [
        ["home", "首页"],
        ["mood", "情绪反扑"],
        ["evidence", "新我证据"],
        ["share", "待分享"],
        ["fear", "害怕"],
        ["greeting", "打招呼"],
        ["sleep", "睡前"],
        ["life", "兴趣生活"],
        ["summary", "一周总结"],
        ["backup", "备份"]
      ];

      const emptyDb = () => ({
        mood: [],
        evidence: [],
        share: [],
        fear: [],
        greeting: [],
        sleep: [],
        restaurant: [],
        workout: [],
        cat: []
      });

      let db = loadDb();
      let state = {
        page: "home",
        lifeTab: "restaurant",
        edit: {},
        searchMood: "",
        restaurantFilters: { area: "", cuisine: "", visited: "all" },
        timer: {
          label: "25 分钟专注",
          total: 25 * 60,
          left: 25 * 60,
          running: false,
          endAt: 0
        }
      };

      function loadDb() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          const data = parsed.data || parsed;
          const next = emptyDb();
          Object.keys(next).forEach((key) => {
            next[key] = Array.isArray(data[key]) ? data[key] : [];
          });
          return next;
        } catch (error) {
          console.warn("本地数据读取失败，已启用空数据。", error);
          return emptyDb();
        }
      }

      function saveDb() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
      }

      function uid() {
        return crypto.randomUUID ? crypto.randomUUID() : `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function dateKey(date = new Date()) {
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      }

      function keyToDate(key) {
        const [year, month, day] = String(key).split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function toDate(value) {
        if (!value) return new Date(0);
        return String(value).length === 10 ? keyToDate(value) : new Date(value);
      }

      function todayStart() {
        const date = new Date();
        date.setHours(0, 0, 0, 0);
        return date;
      }

      function daysAgo(days) {
        const date = todayStart();
        date.setDate(date.getDate() - days);
        return date;
      }

      function lastDays(count) {
        return Array.from({ length: count }, (_, index) => dateKey(daysAgo(count - index - 1)));
      }

      function fmtDate(key) {
        const date = toDate(key);
        return new Intl.DateTimeFormat("zh-CN", {
          month: "long",
          day: "numeric",
          weekday: "short"
        }).format(date);
      }

      function fmtDateTime(value) {
        const date = toDate(value);
        return new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function isPast7(value) {
        const date = toDate(value);
        const start = daysAgo(6);
        const end = new Date();
        end.setHours(23, 59, 59, 999);
        return date >= start && date <= end;
      }

      function isThisWeek(value) {
        const date = toDate(value);
        const start = todayStart();
        const weekday = start.getDay();
        start.setDate(start.getDate() + (weekday === 0 ? -6 : 1 - weekday));
        return date >= start && date <= new Date();
      }

      function sortCreated(items) {
        return [...items].sort((a, b) => toDate(b.createdAt || b.date) - toDate(a.createdAt || a.date));
      }

      function sortDated(items) {
        return [...items].sort((a, b) => toDate(b.date || b.createdAt) - toDate(a.date || a.createdAt));
      }

      function toast(message) {
        toastHost.innerHTML = `<div class="toast">${esc(message)}</div>`;
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          toastHost.innerHTML = "";
        }, 2600);
      }

      function editItem(collection) {
        const id = state.edit[collection];
        return id ? db[collection].find((item) => item.id === id) : null;
      }

      function field(label, value) {
        return `<div class="field"><strong>${esc(label)}</strong><p>${esc(value || "未填写")}</p></div>`;
      }

      function empty(text) {
        return `<div class="empty">${esc(text)}</div>`;
      }

      function stat(title, value, unit) {
        return `<article class="stat"><span>${esc(title)}</span><strong>${value}</strong><span>${esc(unit)}</span></article>`;
      }

      function actions(collection, id) {
        return `
          <div class="actions">
            <button class="btn-soft" data-action="edit" data-collection="${collection}" data-id="${id}" type="button">编辑</button>
            <button class="btn-danger" data-action="delete" data-collection="${collection}" data-id="${id}" type="button">删除</button>
          </div>
        `;
      }

      function formButtons(collection, editing, label = "保存") {
        return `
          <div class="actions">
            <button class="btn" type="submit">${editing ? "保存修改" : label}</button>
            ${editing ? `<button class="btn-ghost" data-action="cancel" data-collection="${collection}" type="button">取消编辑</button>` : ""}
          </div>
        `;
      }

      function input(name, label, value = "", type = "text", required = true) {
        return `<label>${label}<input name="${name}" type="${type}" value="${esc(value)}" ${required ? "required" : ""}></label>`;
      }

      function textarea(name, label, value = "", required = true) {
        return `<label>${label}<textarea name="${name}" ${required ? "required" : ""}>${esc(value)}</textarea></label>`;
      }

      function option(value, current) {
        return `<option value="${esc(value)}" ${value === current ? "selected" : ""}>${esc(value)}</option>`;
      }

      function render() {
        todayPill.textContent = fmtDate(dateKey());
        nav.innerHTML = pages.map(([page, label]) => `
          <button class="nav-btn ${state.page === page ? "active" : ""}" data-page="${page}" type="button">${label}</button>
        `).join("");

        const renderers = {
          home: renderHome,
          mood: renderMood,
          evidence: renderEvidence,
          share: renderShare,
          fear: renderFear,
          greeting: renderGreeting,
          sleep: renderSleep,
          life: renderLife,
          summary: renderSummary,
          backup: renderBackup
        };

        app.innerHTML = (renderers[state.page] || renderHome)();
        paintTimer();
      }

      function stats() {
        const sleepDone = (item) => item.device && item.routine && item.prep;
        const countWeek = (items, getter) => items.filter((item) => isThisWeek(getter(item))).length;
        const countPast7 = (items, getter) => items.filter((item) => isPast7(getter(item))).length;
        return {
          weekMood: countWeek(db.mood, (item) => item.createdAt),
          weekEvidence: countWeek(db.evidence, (item) => item.createdAt),
          weekGreeting: countWeek(db.greeting, (item) => item.date),
          weekWorkout: countWeek(db.workout, (item) => item.date),
          weekSleep: db.sleep.filter((item) => isThisWeek(item.date) && sleepDone(item)).length,
          streakGreeting: greetingStreak(),
          pastMood: countPast7(db.mood, (item) => item.createdAt),
          pastEvidence: countPast7(db.evidence, (item) => item.createdAt),
          pastGreeting: countPast7(db.greeting, (item) => item.date),
          pastWorkout: countPast7(db.workout, (item) => item.date),
          pastSleep: db.sleep.filter((item) => isPast7(item.date) && sleepDone(item)).length,
          pastCat: countPast7(db.cat, (item) => item.date)
        };
      }

      function greetingStreak() {
        const days = new Set(db.greeting.map((item) => item.date));
        let count = 0;
        for (let i = 0; i < 366; i += 1) {
          if (!days.has(dateKey(daysAgo(i)))) break;
          count += 1;
        }
        return count;
      }

      function weeklySummary() {
        const s = stats();
        const lines = [
          "慢慢来，能看见自己，就是很重要的改变。",
          "这些记录不是任务，是你一点点站回自己身边的证据。",
          "不用一次变好，这一周的每个小动作都算数。",
          "你有在生活，也有在学习更温柔地保护自己。"
        ];
        const pick = (s.pastMood + s.pastEvidence + s.pastGreeting + s.pastWorkout + s.pastSleep) % lines.length;
        return `过去 7 天里，你记录了 ${s.pastMood} 次情绪反扑，写下 ${s.pastEvidence} 条新我证据，打了 ${s.pastGreeting} 次招呼，健身 ${s.pastWorkout} 次，睡前模式完成 ${s.pastSleep} 次。${lines[pick]}`;
      }

      function renderHome() {
        const s = stats();
        const recentEvidence = sortCreated(db.evidence).slice(0, 5);
        return `
          <section class="hero">
            <p class="muted">${fmtDateTime(new Date())}</p>
            <h2>新我生活系统</h2>
            <p class="quote">我不需要一次变好，只要每次多站在自己这边一点点。</p>
          </section>
          <section class="quick">
            <button class="btn" data-page="mood" type="button">记录情绪反扑</button>
            <button class="btn" data-page="evidence" type="button">新我证据</button>
            <button class="btn-soft" data-page="share" type="button">待分享但先不发</button>
            <button class="btn-soft" data-page="sleep" type="button">睡前模式</button>
          </section>
          <section class="stats">
            ${stat("本周情绪反扑", s.weekMood, "次")}
            ${stat("本周新我证据", s.weekEvidence, "条")}
            ${stat("本周打招呼", s.weekGreeting, "次")}
            ${stat("本周健身", s.weekWorkout, "次")}
            ${stat("睡前完成", s.weekSleep, "天")}

              ${field("食欲：", item.appetite)}
              ${field("饮水：", item.water)}
              ${field("排便：", item.poop)}
              ${field("精神状态：", item.energy)}
              ${field("用药：", item.medicine || "无")}
              ${field("备注：", item.note || "无")}
            </div>
            <div style="height:10px"></div>
            ${actions("cat", item.id)}
          </article>
        `;
      }

      function renderTimer() {
        return `
          <section class="grid">
            <article class="timer-box">
              <strong id="timerLabel">${esc(state.timer.label)}</strong>
              <div class="timer-clock" id="timerClock">${formatTime(state.timer.left)}</div>
              <div class="actions">
                <button class="btn" data-action="timer-start" type="button">开始</button>
                <button class="btn-soft" data-action="timer-pause" type="button">暂停</button>
                <button class="btn-ghost" data-action="timer-reset" type="button">重置</button>
              </div>
            </article>
            <article class="card">
              <h2>番茄钟 / 睡前仪式计时器</h2>
              <div class="quick">
                <button class="btn-soft" data-action="timer-preset" data-label="25 分钟专注" data-seconds="1500" type="button">25 分钟专注</button>
                <button class="btn-soft" data-action="timer-preset" data-label="5 分钟休息" data-seconds="300" type="button">5 分钟休息</button>
                <button class="btn-soft" data-action="timer-until" data-label="倒计时到 23:00 电子设备下线" data-minute="1380" type="button">到 23:00 下线</button>
                <button class="btn-soft" data-action="timer-until" data-label="倒计时到 23:40 入睡准备" data-minute="1420" type="button">到 23:40 入睡准备</button>
                <button class="btn-soft" data-action="timer-preset" data-label="23:00-23:40 看书 / 洗漱 / 整理" data-seconds="2400" type="button">睡前整理 40 分钟</button>
                <button class="btn-soft" data-action="timer-preset" data-label="23:40-24:00 入睡准备" data-seconds="1200" type="button">入睡准备 20 分钟</button>
              </div>
              <div style="height:12px"></div>
              <div class="notice"><p>${esc(sleepPhase())}</p></div>
            </article>
          </section>
        `;
      }

      function renderSummary() {
        const s = stats();
        return `
          <section class="hero">
            <h2>过去 7 天总结</h2>
            <p class="quote">${esc(weeklySummary())}</p>
          </section>
          <section class="stats">
            ${stat("情绪反扑", s.pastMood, "次")}
            ${stat("新我证据", s.pastEvidence, "条")}
            ${stat("打招呼", s.pastGreeting, "次")}
            ${stat("健身", s.pastWorkout, "次")}
            ${stat("睡前完成", s.pastSleep, "次")}
            ${stat("猫猫照护", s.pastCat, "次")}
          </section>
        `;
      }

      function renderBackup() {
        const total = Object.values(db).reduce((sum, list) => sum + list.length, 0);
        const storageCount = localStorage.length;
        return `
          <section class="card">
            <h2>完整备份 / 恢复</h2>
            <div class="field">
              <strong>当前本地记录</strong>
              <p>共有 ${total} 条记录。数据只保存在这个浏览器的 localStorage 里。</p>
            </div>
            <div style="height:10px"></div>
            <div class="field">
              <strong>完整 localStorage</strong>
              <p>当前域名下共有 ${storageCount} 个 localStorage 数据项。导出会完整保存这些数据项。</p>
            </div>
            <div style="height:12px"></div>
            <div class="actions">
              <button class="btn" data-action="export" type="button">一键导出全部 JSON</button>
              <button class="btn-soft" data-action="import" type="button">一键导入 JSON 备份</button>
            </div>
          </section>
        `;
      }

      function upsert(collection, id, data, newMessage = "已新增。") {
        if (id) {
          const index = db[collection].findIndex((item) => item.id === id);
          if (index >= 0) {
            db[collection][index] = { ...db[collection][index], ...data, updatedAt: new Date().toISOString() };
            state.edit[collection] = "";
            saveDb();
            toast("已保存修改。");
            render();
            return;
          }
        }
        db[collection].push({ id: uid(), createdAt: new Date().toISOString(), ...data });
        saveDb();
        toast(newMessage);
        render();
      }

      function value(form, name) {
        return String(new FormData(form).get(name) || "").trim();
      }

      function handleSubmit(form) {
        const fd = new FormData(form);
        const type = form.dataset.form;
        const id = String(fd.get("id") || "");

        if (type === "moodSearch") {
          state.searchMood = String(fd.get("query") || "");
          render();
          return;
        }

        if (type === "mood") {
          upsert("mood", id, {
            feel: value(form, "feel"),
            realFear: value(form, "realFear"),
            oldSelf: value(form, "oldSelf"),
            next20: value(form, "next20")
          });
        }

        if (type === "evidence") {
          upsert("evidence", id, {
            did: value(form, "did"),
            means: value(form, "means")
          });
        }

        if (type === "share") {
          const old = editItem("share");
          upsert("share", id, {
            who: value(form, "who"),
            message: value(form, "message"),
            motive: value(form, "motive"),
            after20: value(form, "after20"),
            status: old?.status || "继续存着"
          }, "已存好，20 分钟后再决定。");
        }

        if (type === "fear") {
          upsert("fear", id, {
            fearText: value(form, "fearText"),
            origin: value(form, "origin"),
            protect: value(form, "protect"),
            tags: fd.getAll("tags")
          });
        }

        if (type === "greeting") {
          upsert("greeting", id, {
            date: value(form, "date"),
            person: value(form, "person"),
            difficulty: value(form, "difficulty"),
            feeling: value(form, "feeling")
          }, "已打卡。");
        }

        if (type === "sleep") {
          saveSleep(fd, id);
        }

        if (type === "restaurant") {
          upsert("restaurant", id, {
            name: value(form, "name"),
            area: value(form, "area"),
            cuisine: value(form, "cuisine"),
            companion: value(form, "companion"),
            visited: value(form, "visited") === "true",
            note: value(form, "note")
          });
        }

        if (type === "workout") {
          upsert("workout", id, {
            date: value(form, "date"),
            part: value(form, "part"),
            move: value(form, "move"),
            weight: value(form, "weight"),
            sets: value(form, "sets"),
            reps: value(form, "reps"),
            mood: value(form, "mood")
          });
        }

        if (type === "cat") {
          upsert("cat", id, {
            date: value(form, "date"),
            appetite: value(form, "appetite"),
            water: value(form, "water"),
            poop: value(form, "poop"),
            energy: value(form, "energy"),
            medicine: value(form, "medicine"),
            note: value(form, "note")
          });
        }
      }

      function saveSleep(fd, id) {
        const day = String(fd.get("date") || dateKey());
        const data = {
          date: day,
          device: fd.has("device"),
          routine: fd.has("routine"),
          prep: fd.has("prep"),
          note: String(fd.get("note") || "").trim()
        };
        const index = id
          ? db.sleep.findIndex((item) => item.id === id)
          : db.sleep.findIndex((item) => item.date === day);
        if (index >= 0) {
          db.sleep[index] = { ...db.sleep[index], ...data, updatedAt: new Date().toISOString() };
          state.edit.sleep = "";
        } else {
          db.sleep.push({ id: uid(), createdAt: new Date().toISOString(), ...data });
        }
        saveDb();
        toast("睡前模式已保存。");
        render();
      }

      function removeItem(collection, id) {
        if (!confirm("确定要删除这条记录吗？")) return;
        db[collection] = db[collection].filter((item) => item.id !== id);
        if (state.edit[collection] === id) state.edit[collection] = "";
        saveDb();
        toast("已删除。");
        render();
      }

      function collectLocalStorage() {
        const storage = {};
        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (key) storage[key] = localStorage.getItem(key);
        }
        return storage;
      }

      function restoreLocalStorage(storage) {
        localStorage.clear();
        Object.entries(storage).forEach(([key, value]) => {
          localStorage.setItem(key, String(value ?? ""));
        });
      }

      function getStorageFromBackup(parsed) {
        if (parsed && parsed.type === "full-localStorage-backup" && parsed.storage && typeof parsed.storage === "object") {
          return parsed.storage;
        }
        if (parsed && parsed.localStorage && typeof parsed.localStorage === "object") {
          return parsed.localStorage;
        }
        if (parsed && parsed.storage && typeof parsed.storage === "object") {
          return parsed.storage;
        }
        if (parsed && (parsed.data || parsed.mood || parsed.evidence)) {
          return { [STORAGE_KEY]: JSON.stringify(parsed.data || parsed) };
        }
        return null;
      }

      function exportJson() {
        const payload = {
          app: "新我生活系统",
          type: "full-localStorage-backup",
          version: 2,
          exportedAt: new Date().toISOString(),
          origin: location.origin,
          path: location.pathname,
          storage: collectLocalStorage()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `新我生活系统完整备份-${dateKey()}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        toast("完整 JSON 备份已导出。");
      }

      function importJson(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            const storage = getStorageFromBackup(parsed);
            if (!storage) throw new Error("backup format not recognized");
            const count = Object.keys(storage).length;
            const ok = confirm(`导入会清空并替换当前网页的全部 localStorage 数据，共恢复 ${count} 个数据项。确定继续吗？`);
            if (!ok) return;
            restoreLocalStorage(storage);
            sessionStorage.setItem("xinwo_restore_success", "1");
            location.reload();
          } catch (error) {
            alert("导入失败，请确认文件是有效 JSON。");
          } finally {
            importFile.value = "";
          }
        };
        reader.readAsText(file);
      }

      function setTimer(label, seconds) {
        state.timer.label = label;
        state.timer.total = seconds;
        state.timer.left = seconds;
        state.timer.running = false;
        state.timer.endAt = 0;
        paintTimer();
      }

      function setTimerUntil(label, targetMinute) {
        const now = new Date();
        const current = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        let target = targetMinute * 60;
        if (target <= current) target += 24 * 3600;
        setTimer(label, target - current);
      }

      function startTimer() {
        if (state.timer.running) return;
        state.timer.running = true;
        state.timer.endAt = Date.now() + state.timer.left * 1000;
        paintTimer();
      }

      function pauseTimer() {
        if (!state.timer.running) return;
        state.timer.left = Math.max(0, Math.ceil((state.timer.endAt - Date.now()) / 1000));
        state.timer.running = false;
        state.timer.endAt = 0;
        paintTimer();
      }

      function resetTimer() {
        state.timer.running = false;
        state.timer.endAt = 0;
        state.timer.left = state.timer.total;
        paintTimer();
      }

      function tickTimer() {
        if (!state.timer.running) return;
        state.timer.left = Math.max(0, Math.ceil((state.timer.endAt - Date.now()) / 1000));
        if (state.timer.left === 0) {
          state.timer.running = false;
          state.timer.endAt = 0;
          toast(`${state.timer.label}结束了。`);
        }
        paintTimer();
      }

      function paintTimer() {
        const clock = document.querySelector("#timerClock");
        const label = document.querySelector("#timerLabel");
        if (clock) clock.textContent = formatTime(state.timer.left);
        if (label) label.textContent = state.timer.label;
      }

      function formatTime(total) {
        if (total >= 3600) {
          const h = Math.floor(total / 3600);
          const m = Math.floor((total % 3600) / 60);
          const s = total % 60;
          return `${pad(h)}:${pad(m)}:${pad(s)}`;
        }
        return `${pad(Math.floor(total / 60))}:${pad(total % 60)}`;
      }

      function sleepPhase() {
        const now = new Date();
        const minutes = now.getHours() * 60 + now.getMinutes();
        if (minutes < 23 * 60) return "还没到 23:00。你可以先设置“到 23:00 下线”的倒计时。";
        if (minutes < 23 * 60 + 40) return "现在是 23:00-23:40，看书 / 洗漱 / 整理。";
        if (minutes < 24 * 60) return "现在是 23:40-24:00，入睡准备。";
        return "已经过了 24:00，明天也可以重新开始。";
      }

      document.addEventListener("submit", (event) => {
        const form = event.target.closest("form[data-form]");
        if (!form) return;
        event.preventDefault();
        handleSubmit(form);
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-page], [data-action]");
        if (!target) return;

        if (target.dataset.page) {
          state.page = target.dataset.page;
          if (target.dataset.lifeTab) state.lifeTab = target.dataset.lifeTab;
          render();
          scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        const action = target.dataset.action;
        if (action === "edit") {
          state.edit[target.dataset.collection] = target.dataset.id;
          render();
          setTimeout(() => document.querySelector(".card")?.scrollIntoView({ behavior: "smooth", block: "start" }), 0);
        }
        if (action === "cancel") {
          state.edit[target.dataset.collection] = "";
          render();
        }
        if (action === "delete") removeItem(target.dataset.collection, target.dataset.id);
        if (action === "clear-search") {
          state.searchMood = "";
          render();
        }
        if (action === "share-status") {
          const item = db.share.find((entry) => entry.id === target.dataset.id);
          if (item) {
            item.status = target.dataset.status;
            item.statusAt = new Date().toISOString();
            saveDb();
            toast(`已标记为：${item.status}`);
            render();
          }
        }
        if (action === "life-tab") {
          state.lifeTab = target.dataset.lifeTab;
          render();
        }
        if (action === "export") exportJson();
        if (action === "import") importFile.click();
        if (action === "timer-preset") setTimer(target.dataset.label, Number(target.dataset.seconds));
        if (action === "timer-until") setTimerUntil(target.dataset.label, Number(target.dataset.minute));
        if (action === "timer-start") startTimer();
        if (action === "timer-pause") pauseTimer();
        if (action === "timer-reset") resetTimer();
      });

      document.addEventListener("change", (event) => {
        const filter = event.target.closest("[data-filter]");
        if (filter) {
          state.restaurantFilters[filter.dataset.filter] = filter.value;
          render();
          return;
        }
        if (event.target === importFile) importJson(importFile.files[0]);
      });

      setInterval(tickTimer, 1000);
      render();

      if (sessionStorage.getItem("xinwo_restore_success") === "1") {
        sessionStorage.removeItem("xinwo_restore_success");
        toast("备份已恢复成功。");
      }

      /* 安装版离线缓存：需要在 HTTPS 静态站点上打开后才会生效。 */
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((error) => {
            console.warn("离线缓存注册失败：", error);
          });
        });
      }
    })();
  </script>
</body>
</html>
